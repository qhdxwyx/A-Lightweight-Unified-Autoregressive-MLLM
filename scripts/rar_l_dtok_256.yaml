output_dir: output_dir/rar_l_dtok_256

data:
  image_root: /path/to/train_images
  manifest: null
  parquet_root: null
  recursive: true
  random_crop: false
  random_flip: true
  resize_shorter_edge: 256

tokenizer:
  ta_tok_path: /path/to/ta_tok.pth
  vqvae_path: /path/to/vq_ds16_t2i.pt

model:
  name: rar-cond-L
  image_size: 256
  image_seq_len: 256
  max_cond_len: 729
  cond_dim: 1152
  vocab_size: 16384
  dropout: 0.1
  attn_drop: 0.1
  cond_dropout_prob: 0.1
  use_checkpoint: false

train:
  seed: 42
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 8
  mixed_precision: bf16
  learning_rate: 4.0e-4
  weight_decay: 0.03
  adam_beta1: 0.9
  adam_beta2: 0.96
  warmup_steps: 2000
  max_steps: 250000
  max_grad_norm: 1.0
  log_every: 10
  save_every: 5000
  pool_scales: [1, 2, 3]
  pool_scale_weights: [2, 1, 1]
  random_ratio_start: 0.5
  random_ratio_end: 0.0
  random_ratio_anneal_start: 0
  random_ratio_anneal_end: 100000
  init_from: null
