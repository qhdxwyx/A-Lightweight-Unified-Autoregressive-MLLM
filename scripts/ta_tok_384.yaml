output_dir: output_dir/ta_tok_train

data:
  image_root: /path/to/train_images
  manifest: null
  parquet_root: null
  recursive: true
  random_crop: false
  random_flip: true
  resize_shorter_edge: 384

model:
  input_size: 384
  teacher: google/siglip2-so400m-patch14-384
  select_layer_id: -2
  bottleneck_token_num: 729
  bottleneck:
    name: bottleneck
    args:
      bottleneck_dim: 1536
      regularizer:
        name: simvq
        args:
          codebook_size: 65536
          l2_normalized: true
          stochastic: true
          stochastic_temperature: 0.03
  decoder_depth: 3
  pool_scales: [1]
  pool_scale_weights: [1]

train:
  seed: 42
  batch_size: 2
  grad_accum_steps: 8
  num_workers: 8
  prefetch_factor: 4
  mixed_precision: bf16
  learning_rate: 1.0e-4
  weight_decay: 0.03
  adam_beta1: 0.9
  adam_beta2: 0.95
  warmup_steps: 2000
  max_steps: 100000
  max_grad_norm: 1.0
  log_every: 20
  save_every: 5000
  init_from: null
  init_encoder_from_pretrained: true
  freeze_encoder: true
  use_teacher_target: false
  reconstruction_loss_weight: 1.0
  cosine_loss_weight: 0.1
  commitment_loss_weight: 0.25
  codebook_loss_weight: 1.0
